services:
  auth-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    profiles:
      - auth
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      authentik-server:
        condition: service_started
        required: false
    environment:
      OAUTH2_PROXY_PROVIDER: ${OAUTH2_PROXY_PROVIDER:-oidc}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID:-replace-me}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:-replace-me}
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OAUTH2_PROXY_OIDC_ISSUER_URL:-http://authentik-server:9000/application/o/bap-search/}
      OAUTH2_PROXY_SCOPE: ${OAUTH2_PROXY_SCOPE:-openid profile email}
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: ${OAUTH2_PROXY_CODE_CHALLENGE_METHOD:-S256}
      OAUTH2_PROXY_USER_ID_CLAIM: ${OAUTH2_PROXY_USER_ID_CLAIM:-sub}
      OAUTH2_PROXY_EMAIL_CLAIM: ${OAUTH2_PROXY_EMAIL_CLAIM:-email}
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: ${OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL:-true}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-0123456789abcdefghijklmnopqrstuv}
      OAUTH2_PROXY_COOKIE_SECURE: ${OAUTH2_PROXY_COOKIE_SECURE:-false}
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REDIRECT_URL: ${OAUTH2_PROXY_REDIRECT_URL:-http://localhost:8080/oauth2/callback}
      OAUTH2_PROXY_EMAIL_DOMAINS: ${OAUTH2_PROXY_EMAIL_DOMAINS:-*}
      OAUTH2_PROXY_UPSTREAMS: http://backend:8081
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
    ports:
      - "${AUTH_PROXY_PUBLIC_PORT:-8080}:4180"
    networks:
      - public
      - internal

  authentik-postgresql:
    image: postgres:16-alpine
    profiles:
      - authentik
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTHENTIK_POSTGRESQL__NAME:-authentik}
      POSTGRES_USER: ${AUTHENTIK_POSTGRESQL__USER:-authentik}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ${AUTHENTIK_POSTGRESQL_DATA_PATH:-./data/authentik-postgresql}:/var/lib/postgresql/data
    networks:
      - internal

  authentik-redis:
    image: redis:7-alpine
    profiles:
      - authentik
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - ${AUTHENTIK_REDIS_DATA_PATH:-./data/authentik-redis}:/data
    networks:
      - internal

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_VERSION:-2025.8.3}
    profiles:
      - authentik
    restart: unless-stopped
    command: server
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-change-me-to-a-long-random-string}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      AUTHENTIK_DISABLE_UPDATE_CHECK: ${AUTHENTIK_DISABLE_UPDATE_CHECK:-true}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRESQL__NAME:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRESQL__USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD:-change-me}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-akadmin@example.com}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-change-me}
    ports:
      - "${AUTHENTIK_HTTP_PORT:-9000}:9000"
      - "${AUTHENTIK_HTTPS_PORT:-9443}:9443"
    volumes:
      - ${AUTHENTIK_MEDIA_PATH:-./data/authentik-media}:/media
      - ${AUTHENTIK_TEMPLATES_PATH:-./data/authentik-templates}:/templates
    networks:
      - public
      - internal

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_VERSION:-2025.8.3}
    profiles:
      - authentik
    restart: unless-stopped
    command: worker
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-change-me-to-a-long-random-string}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      AUTHENTIK_DISABLE_UPDATE_CHECK: ${AUTHENTIK_DISABLE_UPDATE_CHECK:-true}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRESQL__NAME:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRESQL__USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD:-change-me}
      AUTHENTIK_REDIS__HOST: authentik-redis
    user: root
    volumes:
      - ${AUTHENTIK_MEDIA_PATH:-./data/authentik-media}:/media
      - ${AUTHENTIK_TEMPLATES_PATH:-./data/authentik-templates}:/templates
    networks:
      - internal

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      llama-answer:
        condition: service_started
      llama-rewrite:
        condition: service_started
      llama-embeddings:
        condition: service_started
    environment:
      BAP_ADDR: :8081
      BAP_DB_PATH: /database/bap-search.db
      BAP_SCHEMA_PATH: /app/database/schema.sql
      BAP_TEMPLATE_GLOB: /app/ui/templates/*.html
      BAP_STATIC_DIR: /app/ui/static
      BAP_MODELS_DIR: /models
      BAP_CURRENT_MODEL_PATH: /models/current-model.txt
      BAP_LOG_PATH: /logs/backend.jsonl
      BAP_ALLOW_ANONYMOUS: ${BAP_ALLOW_ANONYMOUS:-true}
      BAP_SESSION_SECRET: ${BAP_SESSION_SECRET:-}
      SEARXNG_SEARCH_URL: http://searxng:8080/search
      LLAMA_CPP_URL: ${LLAMA_CPP_URL:-http://llama-answer:8080/v1/chat/completions}
      LLAMA_CPP_REWRITE_URL: ${LLAMA_CPP_REWRITE_URL:-http://llama-rewrite:8080/v1/chat/completions}
      LLAMA_CPP_EMBEDDINGS_URL: ${LLAMA_CPP_EMBEDDINGS_URL:-http://llama-embeddings:8080/v1/embeddings}
      BAP_SUMMARIZE_URL_LIMIT: ${BAP_SUMMARIZE_URL_LIMIT:-3}
      BAP_FETCH_WORKERS: ${BAP_FETCH_WORKERS:-3}
      BAP_SUMMARY_WORKERS: ${BAP_SUMMARY_WORKERS:-1}
      BAP_MAX_EXTRACT_CHARS: ${BAP_MAX_EXTRACT_CHARS:-12000}
      BAP_MAX_EMBEDDING_CHARS: ${BAP_MAX_EMBEDDING_CHARS:-1600}
      BAP_CHAT_CONTEXT_CHARS: ${BAP_CHAT_CONTEXT_CHARS:-4200}
      BAP_MAX_CHAT_MESSAGES: ${BAP_MAX_CHAT_MESSAGES:-8}
      BAP_LLM_MAX_TOKENS: ${BAP_LLM_MAX_TOKENS:-700}
      BAP_LLM_CONTEXT_TOKENS: ${BAP_LLM_CONTEXT_TOKENS:-8192}
    volumes:
      - ${BAP_MODELS_PATH:-../models}:/models
      - ${BAP_LOGS_PATH:-../logs}:/logs
      - ${BAP_DATABASE_PATH:-../database}:/database
    ports:
      - "${BAP_PUBLIC_PORT:-8080}:8081"
    networks:
      - public
      - internal

  llama-answer:
    image: ${LLAMA_ANSWER_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    restart: always
    environment:
      MODEL_DIR: /models
      CURRENT_MODEL_FILE: /models/current-model.txt
      LLAMA_HOST: 0.0.0.0
      LLAMA_PORT: 8080
      LLAMA_CTX_SIZE: ${LLAMA_ANSWER_CTX_SIZE:-8192}
      LLAMA_THREADS: ${LLAMA_ANSWER_THREADS:-4}
      LLAMA_PARALLEL: ${LLAMA_ANSWER_PARALLEL:-1}
      LLAMA_N_GPU_LAYERS: ${LLAMA_ANSWER_N_GPU_LAYERS:-0}
      LLAMA_MAIN_GPU: ${LLAMA_ANSWER_MAIN_GPU:-0}
      LLAMA_FLASH_ATTN: ${LLAMA_ANSWER_FLASH_ATTN:-false}
      LLAMA_EXTRA_ARGS: ${LLAMA_ANSWER_EXTRA_ARGS:-}
      MODEL_POLL_SECONDS: ${MODEL_POLL_SECONDS:-5}
      LLAMA_AUTO_RELOAD_MODEL: ${LLAMA_AUTO_RELOAD_MODEL:-true}
    entrypoint: ["/bin/sh", "/config/llama-entrypoint.sh"]
    configs:
      - source: llama_entrypoint
        target: /config/llama-entrypoint.sh
    volumes:
      - ${BAP_MODELS_PATH:-../models}:/models
    networks:
      - internal

  llama-rewrite:
    image: ${LLAMA_REWRITE_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    restart: always
    environment:
      MODEL_DIR: /models
      CURRENT_MODEL_FILE: /models/current-rewrite-model.txt
      LLAMA_HOST: 0.0.0.0
      LLAMA_PORT: 8080
      LLAMA_CTX_SIZE: ${LLAMA_REWRITE_CTX_SIZE:-2048}
      LLAMA_THREADS: ${LLAMA_REWRITE_THREADS:-4}
      LLAMA_PARALLEL: ${LLAMA_REWRITE_PARALLEL:-1}
      LLAMA_N_GPU_LAYERS: ${LLAMA_REWRITE_N_GPU_LAYERS:-0}
      LLAMA_MAIN_GPU: ${LLAMA_REWRITE_MAIN_GPU:-0}
      LLAMA_FLASH_ATTN: ${LLAMA_REWRITE_FLASH_ATTN:-false}
      LLAMA_EXTRA_ARGS: ${LLAMA_REWRITE_EXTRA_ARGS:-}
      MODEL_POLL_SECONDS: ${MODEL_POLL_SECONDS:-5}
      LLAMA_AUTO_RELOAD_MODEL: ${LLAMA_AUTO_RELOAD_MODEL:-true}
    entrypoint: ["/bin/sh", "/config/llama-entrypoint.sh"]
    configs:
      - source: llama_entrypoint
        target: /config/llama-entrypoint.sh
    volumes:
      - ${BAP_MODELS_PATH:-../models}:/models
    networks:
      - internal

  llama-embeddings:
    image: ${LLAMA_EMBEDDINGS_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    restart: always
    environment:
      MODEL_DIR: /models
      CURRENT_MODEL_FILE: /models/current-embedding-model.txt
      LLAMA_HOST: 0.0.0.0
      LLAMA_PORT: 8080
      LLAMA_CTX_SIZE: ${LLAMA_EMBEDDINGS_CTX_SIZE:-2048}
      LLAMA_THREADS: ${LLAMA_EMBEDDINGS_THREADS:-4}
      LLAMA_PARALLEL: ${LLAMA_EMBEDDINGS_PARALLEL:-1}
      LLAMA_N_GPU_LAYERS: ${LLAMA_EMBEDDINGS_N_GPU_LAYERS:-0}
      LLAMA_MAIN_GPU: ${LLAMA_EMBEDDINGS_MAIN_GPU:-0}
      LLAMA_FLASH_ATTN: ${LLAMA_EMBEDDINGS_FLASH_ATTN:-false}
      LLAMA_EXTRA_ARGS: ${LLAMA_EMBEDDINGS_EXTRA_ARGS:---embeddings --pooling mean --batch-size 2048 --ubatch-size 2048}
      MODEL_POLL_SECONDS: ${MODEL_POLL_SECONDS:-5}
      LLAMA_AUTO_RELOAD_MODEL: ${LLAMA_AUTO_RELOAD_MODEL:-true}
    entrypoint: ["/bin/sh", "/config/llama-entrypoint.sh"]
    configs:
      - source: llama_entrypoint
        target: /config/llama-entrypoint.sh
    volumes:
      - ${BAP_MODELS_PATH:-../models}:/models
    networks:
      - internal

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      BASE_URL: http://searxng:8080/
      INSTANCE_NAME: bap-search
    dns:
      - 1.1.1.1
      - 8.8.8.8
    configs:
      - source: searxng_settings
        target: /etc/searxng/settings.yml
    networks:
      - public
      - internal

networks:
  public:
  internal:
    internal: true

configs:
  llama_entrypoint:
    content: |
      #!/bin/sh
      set -eu

      SERVER_BIN="${LLAMA_SERVER_BIN:-}"
      if [ -z "$SERVER_BIN" ]; then
        if command -v llama-server >/dev/null 2>&1; then
          SERVER_BIN="$(command -v llama-server)"
        elif command -v server >/dev/null 2>&1; then
          SERVER_BIN="$(command -v server)"
        else
          SERVER_BIN="/app/llama-server"
        fi
      fi

      CURRENT_MODEL_FILE="${CURRENT_MODEL_FILE:-/models/current-model.txt}"
      MODEL_DIR="${MODEL_DIR:-/models}"
      HOST="${LLAMA_HOST:-0.0.0.0}"
      PORT="${LLAMA_PORT:-8080}"
      CTX_SIZE="${LLAMA_CTX_SIZE:-4096}"
      THREADS="${LLAMA_THREADS:-4}"
      PARALLEL="${LLAMA_PARALLEL:-1}"
      N_GPU_LAYERS="${LLAMA_N_GPU_LAYERS:-0}"
      MAIN_GPU="${LLAMA_MAIN_GPU:-0}"
      FLASH_ATTN="${LLAMA_FLASH_ATTN:-false}"
      EXTRA_ARGS="${LLAMA_EXTRA_ARGS:-}"
      POLL_SECONDS="${MODEL_POLL_SECONDS:-5}"
      AUTO_RELOAD_MODEL="${LLAMA_AUTO_RELOAD_MODEL:-true}"

      normalize_ngl() {
        value="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]' | xargs)"
        # Legacy: many docs used 999 to mean "offload as much as possible".
        # llama.cpp now supports explicit 'auto'/'all'. Prefer 'auto' so the server
        # can fit to the available VRAM.
        if [ "$value" = "999" ]; then
          value="auto"
        fi
        printf '%s' "$value"
      }

      is_true() {
        case "$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')" in
          true|1|yes|on)
            return 0
            ;;
          *)
            return 1
            ;;
        esac
      }

      select_model() {
        if [ -f "$CURRENT_MODEL_FILE" ] && [ -s "$CURRENT_MODEL_FILE" ]; then
          model_name="$(tr -d '\r' < "$CURRENT_MODEL_FILE" | head -n 1 | xargs)"
          if [ -n "$model_name" ] && [ -f "$MODEL_DIR/$model_name" ]; then
            printf '%s' "$MODEL_DIR/$model_name"
            return 0
          fi
        fi

        first_model="$(find "$MODEL_DIR" -maxdepth 1 -type f -name '*.gguf' | sort | head -n 1 || true)"
        if [ -n "$first_model" ]; then
          basename "$first_model" > "$CURRENT_MODEL_FILE"
          printf '%s' "$first_model"
          return 0
        fi

        return 1
      }

      active_model=""
      child_pid=""

      start_server() {
        model_path="$1"
        echo "Starting llama.cpp with model: $model_path"

        set -- \
          --host "$HOST" \
          --port "$PORT" \
          --model "$model_path" \
          --ctx-size "$CTX_SIZE" \
          --threads "$THREADS" \
          --parallel "$PARALLEL"

        ngl="$(normalize_ngl "$N_GPU_LAYERS")"
        if [ -n "$ngl" ] && [ "$ngl" != "0" ] && [ "$ngl" != "off" ] && [ "$ngl" != "false" ] && [ "$ngl" != "no" ]; then
          set -- "$@" --n-gpu-layers "$ngl" --main-gpu "$MAIN_GPU"
        fi

        case "$(printf '%s' "$FLASH_ATTN" | tr '[:upper:]' '[:lower:]')" in
          true|1|yes|on)
            set -- "$@" --flash-attn on
            ;;
        esac

        if [ -n "$EXTRA_ARGS" ]; then
          # shellcheck disable=SC2086
          set -- "$@" $EXTRA_ARGS
        fi

        "$SERVER_BIN" "$@" &
        child_pid=$!
        active_model="$model_path"
      }

      stop_server() {
        if [ -n "$child_pid" ] && kill -0 "$child_pid" 2>/dev/null; then
          kill "$child_pid"
          wait "$child_pid" || true
        fi
        child_pid=""
      }

      trap 'stop_server; exit 0' INT TERM

      while true; do
        if model_path="$(select_model)"; then
          desired_model="$model_path"
          if [ -n "$active_model" ] && ! is_true "$AUTO_RELOAD_MODEL"; then
            desired_model="$active_model"
          fi

          if [ "$desired_model" != "$active_model" ]; then
            stop_server
            start_server "$desired_model"
          elif [ -n "$child_pid" ] && ! kill -0 "$child_pid" 2>/dev/null; then
            start_server "$desired_model"
          fi
        else
          echo "No GGUF model found in $MODEL_DIR. Waiting..."
          stop_server
        fi
        sleep "$POLL_SECONDS"
      done

  searxng_settings:
    content: |
      use_default_settings:
        engines:
          remove:
            - google
      server:
        secret_key: "change-me-in-production"
        limiter: false
        image_proxy: false
      search:
        safe_search: 0
        default_lang: en-US
        ban_time_on_fail: 0
        max_ban_time_on_fail: 0
        suspended_times:
          SearxEngineAccessDenied: 0
          SearxEngineCaptcha: 0
          SearxEngineTooManyRequests: 30
        formats:
          - html
          - json
      outgoing:
        request_timeout: 8.0
        max_request_timeout: 15.0
        retries: 1
        enable_http2: false
      ui:
        static_use_hash: true
